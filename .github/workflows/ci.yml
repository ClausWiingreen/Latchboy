name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    env:
      LATCHBOY_ROM_ROOT: ${{ vars.LATCHBOY_ROM_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fetch test roms
        env:
          LATCHBOY_ROM_ROOT: /opt/latchboy
        run: |
          mkdir -p $LATCHBOY_ROM_ROOT
          wget https://gbdev.gg8.se/files/roms/blargg-gb-tests/cpu_instrs.zip
          unzip -d "$LATCHBOY_ROM_ROOT/blargg" cpu_instrs.zip
          rm cpu_instrs.zip

      - name: Run tests
        env:
          LATCHBOY_ROM_ROOT: /opt/latchboy
        run: cargo test --workspace --all-targets

      - name: Milestone 4 required ROM gate
        env:
          LATCHBOY_ROM_ROOT: /opt/latchboy
        run: |
          cargo test -p latchboy-core --test external_rom_validation \
            required_milestone_4_roms_pass_under_external_validation_flow -- --exact
