# External ROM validation manifest used by core/tests/external_rom_validation.rs.
#
# ROM binaries are expected to be present under $LATCHBOY_ROM_ROOT and are never
# committed to this repository (see docs/rom-usage-policy.md).

[[roms]]
id = "blargg-cpu-instrs-01-special"
suite = "blargg_cpu_instrs"
path = "blargg/cpu_instrs/individual/01-special.gb"
milestone = 2
required = true
cycle_limit = 20_000_000
frame_limit = 300
wall_time_limit_ms = 8_000
pass_condition = "blargg_registers"

